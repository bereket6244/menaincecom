name: Deploy Shop

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Build client for /shop
        working-directory: client
        env:
          VITE_APP_BASE_PATH: /shop
        run: |
          npm ci
          npm run build

      - name: Package shop files
        run: |
          cd client/dist
          zip -r ../../shop-deploy.zip .

      - name: Package server files
        run: |
          rm -rf server-deploy
          mkdir -p server-deploy/tmp server-deploy/uploads
          cp server/app.js server/package.json server/package-lock.json server-deploy/
          cp -R server/src server-deploy/
          touch server-deploy/uploads/.gitkeep
          date -u +"%Y-%m-%dT%H:%M:%SZ" > server-deploy/tmp/restart.txt
          cd server-deploy
          zip -r ../server-deploy.zip .

      - name: Resolve cPanel endpoint
        env:
          CPANEL_HOST: ${{ secrets.CPANEL_HOST }}
          CPANEL_URL: ${{ secrets.CPANEL_URL }}
          CPANEL_PORT: ${{ secrets.CPANEL_PORT }}
        run: |
          set -euo pipefail

          trim() {
            local value="$1"
            value="${value#"${value%%[![:space:]]*}"}"
            value="${value%"${value##*[![:space:]]}"}"
            printf '%s' "${value}"
          }

          if [ -n "${CPANEL_URL}" ]; then
            base_url="$(trim "${CPANEL_URL}")"
            base_url="${base_url%/}"
            host_port="${base_url#https://}"
            host_port="${host_port#http://}"
            host_port="${host_port%%/*}"
          else
            if [ -z "${CPANEL_HOST}" ]; then
              echo "CPANEL_HOST is empty. Set CPANEL_HOST to your cPanel server hostname, or set CPANEL_URL to the full cPanel base URL." >&2
              exit 1
            fi
            host="$(trim "${CPANEL_HOST}")"
            host="${host#https://}"
            host="${host#http://}"
            host="${host%/}"
            host="${host%%/*}"
            port="${CPANEL_PORT:-2083}"
            if [[ "${host}" == *:* ]]; then
              base_url="https://${host}"
              host_port="${host}"
            else
              base_url="https://${host}:${port}"
              host_port="${host}:${port}"
            fi
          fi

          host="${host_port%%:*}"
          if [ -z "${host}" ] || [[ "${host}" == *"*"* ]] || [[ "${host}" == *" "* ]]; then
            echo "Invalid cPanel hostname. CPANEL_HOST should look like 'server.example.com' or CPANEL_URL should look like 'https://server.example.com:2083'." >&2
            exit 1
          fi

          echo "Resolved cPanel endpoint on port ${host_port##*:}."
          if ! getent hosts "${host}" >/dev/null 2>&1; then
            fallback_host="cpanel.menaincet.com"
            fallback_url="https://${fallback_host}:2083"
            echo "Could not resolve the cPanel host from DNS. Falling back to ${fallback_url}."
            if ! getent hosts "${fallback_host}" >/dev/null 2>&1; then
              echo "Could not resolve the configured cPanel host or the fallback host." >&2
              echo "Set CPANEL_URL to the full cPanel base URL, for example 'https://cpanel.menaincet.com:2083'." >&2
              exit 1
            fi
            base_url="${fallback_url}"
            host_port="${fallback_host}:2083"
          fi

          echo "CPANEL_BASE_URL=${base_url}" >> "$GITHUB_ENV"

          curl --show-error --silent --head \
            --connect-timeout 15 \
            --max-time 30 \
            --retry 2 \
            --retry-all-errors \
            "${base_url}/" >/dev/null

      - name: Upload archive to cPanel
        env:
          CPANEL_USER: ${{ secrets.CPANEL_USER }}
          CPANEL_TOKEN: ${{ secrets.CPANEL_TOKEN }}
          CPANEL_TARGET_DIR: ${{ secrets.CPANEL_TARGET_DIR }}
        run: |
          curl --fail-with-body --show-error --silent \
            --connect-timeout 20 \
            --max-time 120 \
            --retry 2 \
            --retry-all-errors \
            -H "Authorization: cpanel ${CPANEL_USER}:${CPANEL_TOKEN}" \
            -F "dir=${CPANEL_TARGET_DIR}" \
            -F "overwrite=1" \
            -F "file=@shop-deploy.zip;filename=shop-deploy.zip" \
            "${CPANEL_BASE_URL}/execute/Fileman/upload_files"

      - name: Extract archive on cPanel
        env:
          CPANEL_USER: ${{ secrets.CPANEL_USER }}
          CPANEL_TOKEN: ${{ secrets.CPANEL_TOKEN }}
          CPANEL_TARGET_DIR: ${{ secrets.CPANEL_TARGET_DIR }}
        run: |
          curl --fail-with-body --show-error --silent --get \
            --connect-timeout 20 \
            --max-time 120 \
            --retry 2 \
            --retry-all-errors \
            -H "Authorization: cpanel ${CPANEL_USER}:${CPANEL_TOKEN}" \
            --data-urlencode "cpanel_jsonapi_user=${CPANEL_USER}" \
            --data-urlencode "cpanel_jsonapi_apiversion=2" \
            --data-urlencode "cpanel_jsonapi_module=Fileman" \
            --data-urlencode "cpanel_jsonapi_func=fileop" \
            --data-urlencode "op=extract" \
            --data-urlencode "sourcefiles=${CPANEL_TARGET_DIR}/shop-deploy.zip" \
            --data-urlencode "destfiles=${CPANEL_TARGET_DIR}" \
            "${CPANEL_BASE_URL}/json-api/cpanel"

      - name: Resolve cPanel server directory
        env:
          CPANEL_TARGET_DIR: ${{ secrets.CPANEL_TARGET_DIR }}
          CPANEL_SERVER_DIR: ${{ secrets.CPANEL_SERVER_DIR }}
          CPANEL_USER: ${{ secrets.CPANEL_USER }}
          CPANEL_TOKEN: ${{ secrets.CPANEL_TOKEN }}
        run: |
          set -euo pipefail

          apps_json="$(curl --fail-with-body --show-error --silent \
            --connect-timeout 20 \
            --max-time 120 \
            --retry 2 \
            --retry-all-errors \
            -H "Authorization: cpanel ${CPANEL_USER}:${CPANEL_TOKEN}" \
            "${CPANEL_BASE_URL}/execute/PassengerApps/list_applications")"

          printf '%s\n' "${apps_json}" | jq '
            (.data // [])
            | map(select(((.base_uri // .uri // .url // "") == "/shop") or ((.name // "") | test("shop"; "i"))))
            | map({
                name,
                path: (.path // .app_root // .app_path // null),
                base_uri: (.base_uri // .uri // .url // null),
                startup_file: (.startup_file // .startupfile // .entry_point // .startup // null),
                app_type: (.app_type // .type // null),
                enabled,
                deployment_mode
              })
          '

          app_path="$(printf '%s' "${apps_json}" | jq -r '
            (.data // [])
            | map(select(((.base_uri // .uri // .url // "") == "/shop") or ((.name // "") | test("shop"; "i"))))
            | first
            | (.path // .app_root // .app_path // empty)
          ')"

          if [ -n "${app_path}" ] && [[ "${app_path}" = /* ]]; then
            server_dir="${app_path%/}"
            app_path="${server_dir#/home/${CPANEL_USER}/}"
          elif [ -n "${app_path}" ]; then
            app_path="${app_path%/}"
            server_dir="/home/${CPANEL_USER}/${app_path}"
          elif [ -n "${CPANEL_SERVER_DIR:-}" ]; then
            server_dir="${CPANEL_SERVER_DIR%/}"
            app_path="${server_dir#/home/${CPANEL_USER}/}"
            echo "Using CPANEL_SERVER_DIR fallback because /shop Passenger app was not discovered."
          elif [[ "${CPANEL_TARGET_DIR}" == */public_html/* ]]; then
            home_dir="${CPANEL_TARGET_DIR%%/public_html/*}"
            server_dir="${home_dir}/mena-shop-app-v2/server"
            app_path="${server_dir#/home/${CPANEL_USER}/}"
          else
            echo "CPANEL_SERVER_DIR is required when the Passenger app cannot be discovered." >&2
            exit 1
          fi

          if [ -z "${server_dir:-}" ] || [ -z "${app_path:-}" ]; then
            echo "Could not resolve the cPanel Passenger app directory." >&2
            exit 1
          fi

          echo "Deploying server to ${server_dir}"
          echo "CPANEL_SERVER_DIR_RESOLVED=${server_dir}" >> "$GITHUB_ENV"
          echo "CPANEL_APP_PATH_RESOLVED=${app_path}" >> "$GITHUB_ENV"

      - name: Upload server archive to cPanel
        env:
          CPANEL_USER: ${{ secrets.CPANEL_USER }}
          CPANEL_TOKEN: ${{ secrets.CPANEL_TOKEN }}
        run: |
          curl --fail-with-body --show-error --silent \
            --connect-timeout 20 \
            --max-time 120 \
            --retry 2 \
            --retry-all-errors \
            -H "Authorization: cpanel ${CPANEL_USER}:${CPANEL_TOKEN}" \
            -F "dir=${CPANEL_SERVER_DIR_RESOLVED}" \
            -F "overwrite=1" \
            -F "file=@server-deploy.zip;filename=server-deploy.zip" \
            "${CPANEL_BASE_URL}/execute/Fileman/upload_files"

      - name: Extract server archive on cPanel
        env:
          CPANEL_USER: ${{ secrets.CPANEL_USER }}
          CPANEL_TOKEN: ${{ secrets.CPANEL_TOKEN }}
        run: |
          curl --fail-with-body --show-error --silent --get \
            --connect-timeout 20 \
            --max-time 120 \
            --retry 2 \
            --retry-all-errors \
            -H "Authorization: cpanel ${CPANEL_USER}:${CPANEL_TOKEN}" \
            --data-urlencode "cpanel_jsonapi_user=${CPANEL_USER}" \
            --data-urlencode "cpanel_jsonapi_apiversion=2" \
            --data-urlencode "cpanel_jsonapi_module=Fileman" \
            --data-urlencode "cpanel_jsonapi_func=fileop" \
            --data-urlencode "op=extract" \
            --data-urlencode "sourcefiles=${CPANEL_SERVER_DIR_RESOLVED}/server-deploy.zip" \
            --data-urlencode "destfiles=${CPANEL_SERVER_DIR_RESOLVED}" \
            "${CPANEL_BASE_URL}/json-api/cpanel"

      - name: Install server dependencies on cPanel
        env:
          CPANEL_USER: ${{ secrets.CPANEL_USER }}
          CPANEL_TOKEN: ${{ secrets.CPANEL_TOKEN }}
        run: |
          deps_json="$(curl --fail-with-body --show-error --silent --get \
            --connect-timeout 20 \
            --max-time 180 \
            --retry 2 \
            --retry-all-errors \
            -H "Authorization: cpanel ${CPANEL_USER}:${CPANEL_TOKEN}" \
            --data-urlencode "type=npm" \
            --data-urlencode "app_path=${CPANEL_APP_PATH_RESOLVED}" \
            "${CPANEL_BASE_URL}/execute/PassengerApps/ensure_deps")"

          echo "${deps_json}"
          sse_url="$(printf '%s' "${deps_json}" | jq -r '.data.sse_url // empty')"
          if [ -n "${sse_url}" ]; then
            echo "Waiting for cPanel npm dependency task..."
            timeout 240 curl --show-error --silent --no-buffer \
              -H "Authorization: cpanel ${CPANEL_USER}:${CPANEL_TOKEN}" \
              "${CPANEL_BASE_URL}${sse_url}" | tee ensure-deps.log || true
            if grep -Eiq 'npm ERR!|error:|failed|traceback|exception' ensure-deps.log; then
              echo "cPanel dependency installation reported an error." >&2
              exit 1
            fi
          fi

      - name: Warm up Passenger app
        run: sleep 60

      - name: Verify live shop
        run: |
          curl --fail --show-error --silent --head https://menaincet.com/shop/
          curl --fail --show-error --silent --head https://menaincet.com/shop/catalog
          curl --fail --show-error --silent https://menaincet.com/shop/api/complimentary-items >/dev/null
